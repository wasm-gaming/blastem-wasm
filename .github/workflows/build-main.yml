name: Build main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build SDK (TypeScript + manifest + demo shell)
        run: make build-sdk
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: dist/

  wasm:
    runs-on: ubuntu-latest
    container:
      image: emscripten/emsdk:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build WASM runtime
        run: |
          apt-get update -qq && apt-get install -y wget tar -qq
          make build-wasm-ci
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-dist
          path: |
            dist/blastem/
            dist/original/

  release:
    needs: [sdk, wasm]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist
      - name: Attach artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/blastem/blastem.js
            dist/blastem/blastem.wasm
            dist/blastem/blastem.sdk.js
            dist/blastem/blastem.sdk.d.ts
            dist/blastem/blastem.options.js
            dist/blastem/blastem.options.d.ts
            dist/blastem/blastem.manifest.js
            dist/blastem/blastem.manifest.d.ts
            dist/manifest.json
            dist/index.html
            dist/demo.js

  pages:
    needs: [sdk, wasm]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: wasm-dist
          path: dist
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
